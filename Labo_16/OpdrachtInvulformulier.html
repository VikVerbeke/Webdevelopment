<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opdracht invulformulier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>Opdracht invulformulier</h1>

<form action="" method="post">
    <fieldset>
        <legend>Persoonlijke informatie</legend>
            <label for="voornaam">Voornaam*:</label>
            <input type="text" id="voornaam" name="voornaam" placeholder="Your first name" autofocus="autofocus"><br>
        <label for="achternaam">Achternaam*:</label>
        <input type="text" id="achternaam" name="achternaam" placeholder="Your last name"><br><br>
    </fieldset>
    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <input type="checkbox" name="lopen" value="v">
        Lopen<br>
        <input type="checkbox" name="zwemmen" value="v">
        Zwemmen<br>
        <input type="checkbox" name="Roeien" value="v">
        Roeien<br>
    </fieldset>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <input type="radio" name="betaalmiddel" >
        Per post <br>
        <input type="radio" name=="betaalmiddel">
        E-mail
    </fieldset>
    <fieldset>
        <legend>Favorieten</legend>
        <label for="favorieteFilm">Favoriete film:</label>
        <input type="text" id="favorieteFilm" name="favorieteFilm" >
        <br>
        <label for="favorieteQuote">Favoriete quote:</label>
        <input type="text" id="favorieteQuote" name="favorieteQuote" placeholder="Schrijf je favoriete quote">
        <br>
        <label for="favorieteEten">Favoriete eten:</label>
        <select id="favorieteEten" name="favorieteEten" size="3">
            <option value="hamburger">Hamburger</option>
            <option value="hotdog">Hot-dog</option>
            <option value="pizza">Pizza</option>
            </select>
    </fieldset>
    <fieldset>
        <legend>Beveiliging & contact</legend>
        <label for="wachtwoord">Wachtwoord*:</label>
        <input type="password" id="wachtwoord" name="wachtwoord" size="10" maxlength="10"> <br>
            <label for="email">E-mailadres:</label>
            <input type="text" id="email" name="email" placeholder="Geef je e-mailadres in"> <br>
        <label for="site">Favorite site:</label>
        <input type="text" id="site" name="site" placeholder="Geef de URL van je favorite site in">
    </fieldset>
    <fieldset>          <!-- Ik zit hier -->
        <legend>Extra informatie</legend>
        <label for="favorieteGetal">Favoriete getal tussen 1 - 10:</label>
        <input type="text" id="favorieteGetal" name="favorieteGetal" > <br>
            <label for="favorieteGetalMax1000">Favoriete getal tussen 11 - 1000:</label>
            <input type="range" id="favorieteGetalMax1000" name="favorieteGetalMax1000" min="11" max="1000"> <br>
        <label for="geboortedatum">Wanneer ben je geboren?</label>
        <input type="date" id="geboortedatum" name="geboortedatum"> <br>
            <label for="postcode">Belgische postcode*:</label>
            <input type="text" id="postcode" name="postcode" maxlength="4" required pattern="([1-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])" title="Voer een geldige Belgische postcode in tussen 1000 en 9992">
    </fieldset>
    <fieldset>
        <legend>Varia</legend>
        <label for="zoeken">Zoeken naar iets:</label>
        <input type="search" id="zoeken" name="zoeken" > <br>
            <label for="lievelingsKleur">Wat is je lievelingskleur:</label>
            <input type="color" id="lievelingsKleur" name="lievelingsKleur"> <br>
        <label for="bestandUploaden"></label>
        <input type="file" id="bestandUploaden" name="bestandUploaden">
    </fieldset>

    <input type="submit" value="Submit">
</form>

</body>
</html>

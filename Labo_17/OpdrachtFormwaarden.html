<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opdracht formwaarden</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>Opdracht formwaarden</h1>

<form action="" method="get">

    <label for="roker">Is roker</label>
    <input type="checkbox" id="roker" name="roker"><br><br>

    <label>Moedertaal</label>
    <input type="radio" id="taal_nl" name="moedertaal" value="nl">
    <label for="taal_nl">Nederlands</label>

    <input type="radio" id="taal_fr" name="moedertaal" value="fr">
    <label for="taal_fr">Frans</label>

    <input type="radio" id="taal_en" name="moedertaal" value="en">
    <label for="taal_en">Engels</label><br><br>

    <label for="buurland">Favoriete buurland</label>
    <select id="buurland" name="favoriete_buurland">
        <option value="Nederland">Nederland</option>
        <option value="Frankrijk">Frankrijk</option>
        <option value="Duitsland">Duitsland</option>
    </select><br>

    <label for="bestelling">Bestelling</label>
    <select id="bestelling" name="bestelling" multiple size="6">
        <option value="aardappelen">aardappelen</option>
        <option value="brood">brood</option>
        <option value="melk">melk</option>
        <option value="biefstuk">biefstuk</option>
        <option value="chips">chips</option>
        <option value="krant">krant</option>
    </select><br>

    <button type="submit" id="resultaatKnop">Toon resultaat</button>

</form>

<script src="Scripts/ScriptFormwaarden.js"></script>

</body>
</html>
